name: Deploy to Cloud Run

on:
  push:
    branches: [ "main" ]

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: asia-south1
  SERVICE_NAME: loktantra-ai

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Google Auth
      uses: 'google-github-actions/auth@v2'
      with:
        credentials_json: '${{ secrets.GCP_SA_KEY }}'

    - name: Set up Cloud SDK
      uses: 'google-github-actions/setup-gcloud@v2'

    - name: Authorize Docker
      run: gcloud auth configure-docker asia-south1-docker.pkg.dev

    - name: Build and Push Container
      run: |-
        docker build -t "asia-south1-docker.pkg.dev/${{ env.PROJECT_ID }}/loktantra-repo/${{ env.SERVICE_NAME }}:${{ github.sha }}" .
        docker push "asia-south1-docker.pkg.dev/${{ env.PROJECT_ID }}/loktantra-repo/${{ env.SERVICE_NAME }}:${{ github.sha }}"

    - name: Deploy to Cloud Run
      run: |-
        gcloud run deploy ${{ env.SERVICE_NAME }} \
          --image "asia-south1-docker.pkg.dev/${{ env.PROJECT_ID }}/loktantra-repo/${{ env.SERVICE_NAME }}:${{ github.sha }}" \
          --region ${{ env.REGION }} \
          --platform managed \
          --allow-unauthenticated \
          --port 3000
